name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE]: "
labels: ["enhancement"]

body:

* type: textarea
  id: feature
  attributes:
  label: Feature Description
  description: Describe the feature you'd like to add.
  validations:
  required: true

* type: textarea
  id: reason
  attributes:
  label: Why is this feature needed?
  description: Explain the motivation behind this feature.
  validations:
  required: true

* type: textarea
  id: solution
  attributes:
  label: Proposed Solution
  description: How would you like this feature to work?

* type: textarea
  id: additional
  attributes:
  label: Additional Context
  description: Add any extra information, screenshots, or references.
